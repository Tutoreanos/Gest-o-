const FONT="'Instrument Sans','DM Sans',system-ui,sans-serif";
const FONT_D="'DM Sans','Instrument Sans',system-ui,sans-serif";

const T={
  bg:"#0a0d12",surface:"#111620",surfaceHover:"#181e2c",card:"#141a24",cardHover:"#1a2030",
  border:"#1e2536",borderLight:"#181f2e",borderAccent:"rgba(59,130,246,0.25)",

  accent:"#3b82f6",accentSoft:"rgba(59,130,246,0.1)",accentMed:"rgba(59,130,246,0.2)",

const STATUS={"Não iniciado":{c:"#6b7280",bg:"#1e2130"},"Em andamento":{c:"#3b82f6",bg:"rgba(59,130,246,0.12)"},"Concluído":{c:"#22c55e",bg:"rgba(34,197,94,0.12)"},"Atrasado":{c:"#ef4444",bg:"rgba(239,68,68,0.12)"}};
const PRIORITY={"Alta":{c:"#ef4444",bg:"rgba(239,68,68,0.12)"},"Média":{c:"#f59e0b",bg:"rgba(245,158,11,0.12)"},"Baixa":{c:"#6b7280",bg:"#1e2130"}};

// ═══════════════════════════════════════════════════════════
// REUSABLE COMPONENTS
// ═══════════════════════════════════════════════════════════
function Badge({children,color,bg}){return <span style={{display:"inline-flex",alignItems:"center",fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:5,color,background:bg,letterSpacing:0.3,whiteSpace:"nowrap"}}>{children}</span>}
function StatusBadge({status}){const s=STATUS[status]||STATUS["Não iniciado"];return <Badge color={s.c} bg={s.bg}>{status}</Badge>}
function PriorityBadge({p}){const x=PRIORITY[p]||PRIORITY["Média"];return <Badge color={x.c} bg={x.bg}>{p}</Badge>}

function ProgressBar({value,max=100,height=5,color=T.accent,bg="rgba(255,255,255,0.04)"}){
  const p=pct((value/max)*100);
  return <div style={{width:"100%",height,borderRadius:height,background:bg,overflow:"hidden"}}>
    <div style={{width:p+"%",height:"100%",borderRadius:height,background:p>=80?T.success:p>=50?color:p>=25?T.warning:T.danger,transition:"width 0.7s cubic-bezier(.4,0,.2,1)"}}/>
  </div>;
}

function CircleGauge({value,size=80,stroke=5,label,sub,color}){
  const r=(size-stroke*2)/2,C=2*Math.PI*r,off=C-(value/100)*C;
  const clr=color||(value>=80?T.success:value>=50?T.accent:value>=25?T.warning:T.danger);
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={clr} strokeWidth={stroke} strokeDasharray={C} strokeDashoffset={off} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1)"}}/>
      <text x={size/2} y={size/2-2} textAnchor="middle" fill={T.text} fontSize={size*0.2} fontWeight="700" fontFamily={FONT}>{value}%</text>
      {sub&&<text x={size/2} y={size/2+size*0.12} textAnchor="middle" fill={T.textMuted} fontSize={size*0.09} fontFamily={FONT}>{sub}</text>}
    </svg>
    {label&&<div style={{fontSize:11,fontWeight:600,color:T.textSecondary,textAlign:"center",maxWidth:size+20,lineHeight:1.3}}>{label}</div>}
  </div>;
}

function Btn({children,onClick,variant="primary",size="md",icon:Ic,disabled,style:extra={}}){
  const base={display:"inline-flex",alignItems:"center",gap:6,border:"none",borderRadius:8,cursor:disabled?"not-allowed":"pointer",fontWeight:600,fontFamily:FONT,transition:"all 0.15s ease",whiteSpace:"nowrap",opacity:disabled?0.5:1};
  const sizes={xs:{padding:"4px 8px",fontSize:11},sm:{padding:"5px 12px",fontSize:12},md:{padding:"8px 16px",fontSize:13}};
  const vars={
    primary:{background:T.accent,color:"#fff"},
    ghost:{background:"transparent",color:T.textMuted,border:"1px solid "+T.border},
    danger:{background:T.dangerSoft,color:T.danger},
    success:{background:T.successSoft,color:T.success},
    purple:{background:T.purpleSoft,color:T.purple},
  };
  return <button onClick={disabled?undefined:onClick} style={{...base,...sizes[size],...vars[variant],...extra}}
    onMouseEnter={e=>{if(!disabled)e.currentTarget.style.opacity="0.85"}}
    onMouseLeave={e=>{e.currentTarget.style.opacity=disabled?"0.5":"1"}}>
    {Ic&&<Ic style={{width:size==="xs"?12:size==="sm"?13:15,height:size==="xs"?12:size==="sm"?13:15}}/>}{children}
  </button>;
}

function Input({label,value,onChange,type="text",placeholder,options,rows,style:extra={}}){
  const s={padding:"8px 12px",borderRadius:8,border:"1px solid "+T.border,background:T.surface,color:T.text,fontSize:13,fontFamily:FONT,outline:"none",width:"100%",...extra};
  return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {label&&<label style={{fontSize:10,fontWeight:600,color:T.textMuted,letterSpacing:0.5,textTransform:"uppercase"}}>{label}</label>}
    {options?<select value={value} onChange={e=>onChange(e.target.value)} style={s}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>
    :rows?<textarea value={value} onChange={e=>onChange(e.target.value)} rows={rows} placeholder={placeholder} style={{...s,resize:"vertical"}}/>
    :<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={s}/>}
  </div>;
}

function Modal({title,children,onClose,width=600}){
  return <div className="fade-in" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}} onClick={onClose}>
    <div className="slide-in" onClick={e=>e.stopPropagation()} style={{background:T.card,borderRadius:16,border:"1px solid "+T.border,width:"100%",maxWidth:width,maxHeight:"88vh",overflow:"auto",boxShadow:"0 32px 64px rgba(0,0,0,0.5)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:"1px solid "+T.border,position:"sticky",top:0,background:T.card,zIndex:1,borderRadius:"16px 16px 0 0"}}>
        <h3 style={{margin:0,fontSize:15,fontWeight:700,color:T.text,fontFamily:FONT_D}}>{title}</h3>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:T.textMuted,padding:4}}><Icons.X style={{width:18,height:18}}/></button>
      </div>
      <div style={{padding:20}}>{children}</div>
    </div>
  </div>;
}

function MiniBar({data,height=130}){
  const max=Math.max(...data.map(d=>d.value),1);
  return <div style={{display:"flex",alignItems:"flex-end",gap:5,height,padding:"8px 0"}}>
    {data.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
      <span style={{fontSize:9,color:T.textMuted,fontWeight:600}}>{d.value}</span>
      <div style={{width:"100%",maxWidth:32,height:(d.value/max)*100+"%",minHeight:3,borderRadius:4,background:d.color||T.accent,transition:"height 0.5s ease"}}/>
      <span style={{fontSize:8,color:T.textDim,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:50,textAlign:"center"}}>{d.label}</span>
    </div>)}
  </div>;
}

function Checkbox({checked,onChange,label}){
  return <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,color:checked?T.success:T.text,transition:"all 0.15s"}}
    onClick={e=>{e.stopPropagation();onChange(!checked)}}>
    <div style={{width:18,height:18,borderRadius:5,border:checked?"none":"2px solid "+T.border,background:checked?T.success:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s ease",flexShrink:0}}>
      {checked&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
    </div>
    <span style={{textDecoration:checked?"line-through":"none",opacity:checked?0.6:1,transition:"all 0.2s"}}>{label}</span>
  </label>;
}

// ═══════════════════════════════════════════════════════════
// COMPUTE OKR PROGRESS FROM ACTIONS
// ═══════════════════════════════════════════════════════════
function calcKRProgress(kr){
  if(!kr.acoes||kr.acoes.length===0)return 0;
  const done=kr.acoes.filter(a=>a.status==="Concluído").length;
  return pct((done/kr.acoes.length)*100);
}
function calcOKRProgress(okr){
  if(!okr.keyResults||okr.keyResults.length===0)return 0;
  const sum=okr.keyResults.reduce((s,kr)=>s+calcKRProgress(kr),0);
  return pct(sum/okr.keyResults.length);
}
function calcProjectProgress(project){
  if(!project.okrs||project.okrs.length===0)return 0;
  const sum=project.okrs.reduce((s,o)=>s+calcOKRProgress(o),0);
  return pct(sum/project.okrs.length);
}
function getAllActions(project){
  return project.okrs?.flatMap(o=>o.keyResults?.flatMap(kr=>kr.acoes||[])||[])||[];
}

      <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:32}}>

          <Icons.Target style={{width:28,height:28,color:"#fff"}}/>

        <p style={{fontSize:12,color:T.textMuted,fontWeight:500}}>Gestão de Projetos & OKRs</p>
      </div>

      {/* Form */}
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          <label style={{fontSize:11,fontWeight:600,color:T.textMuted,letterSpacing:0.5,textTransform:"uppercase"}}>Usuário</label>

            <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:T.textDim}}>

// MAIN APP
// ═══════════════════════════════════════════════════════════
function App(){
  const[auth,setAuth]=useState(null);
  const[projects,setProjects]=useState(INIT_PROJECTS);
  const[page,setPage]=useState("dashboard");
  const[selProj,setSelProj]=useState(null);
  const[modal,setModal]=useState(null);

  const handleLogout=()=>{setAuth(null);setPage("dashboard");setSelProj(null);setModal(null)};

  // Show login if not authenticated
  if(!auth)return <LoginPage onLogin={setAuth}/>;

  // Deep updater for nested OKR structure
  const updateProjectDeep=(pId,updater)=>setProjects(ps=>ps.map(p=>p.id===pId?updater(p):p));

  // Project CRUD
  const addProject=d=>setProjects(ps=>[...ps,{...d,id:uid(),okrs:[]}]);
  const updateProject=(id,d)=>updateProjectDeep(id,p=>({...p,...d}));
  const deleteProject=id=>{setProjects(ps=>ps.filter(p=>p.id!==id));if(selProj?.id===id)setSelProj(null);setPage("projetos")};

  // OKR CRUD
  const addOKR=(pId,d)=>updateProjectDeep(pId,p=>({...p,okrs:[...p.okrs||[],{...d,id:uid(),keyResults:[]}]}));
  const updateOKR=(pId,oId,d)=>updateProjectDeep(pId,p=>({...p,okrs:(p.okrs||[]).map(o=>o.id===oId?{...o,...d}:o)}));
  const deleteOKR=(pId,oId)=>updateProjectDeep(pId,p=>({...p,okrs:(p.okrs||[]).filter(o=>o.id!==oId)}));

  // KR CRUD
  const addKR=(pId,oId,d)=>updateProjectDeep(pId,p=>({...p,okrs:(p.okrs||[]).map(o=>o.id===oId?{...o,keyResults:[...o.keyResults||[],{...d,id:uid(),acoes:[]}]}:o)}));
  const updateKR=(pId,oId,kId,d)=>updateProjectDeep(pId,p=>({...p,okrs:(p.okrs||[]).map(o=>o.id===oId?{...o,keyResults:(o.keyResults||[]).map(k=>k.id===kId?{...k,...d}:k)}:o)}));
  const deleteKR=(pId,oId,kId)=>updateProjectDeep(pId,p=>({...p,okrs:(p.okrs||[]).map(o=>o.id===oId?{...o,keyResults:(o.keyResults||[]).filter(k=>k.id!==kId)}:o)}));

  // Action CRUD
  const addAction=(pId,oId,kId,d)=>updateProjectDeep(pId,p=>({...p,okrs:(p.okrs||[]).map(o=>o.id===oId?{...o,keyResults:(o.keyResults||[]).map(k=>k.id===kId?{...k,acoes:[...k.acoes||[],{...d,id:uid()}]}:k)}:o)}));
  const updateAction=(pId,oId,kId,aId,d)=>updateProjectDeep(pId,p=>({...p,okrs:(p.okrs||[]).map(o=>o.id===oId?{...o,keyResults:(o.keyResults||[]).map(k=>k.id===kId?{...k,acoes:(k.acoes||[]).map(a=>a.id===aId?{...a,...d}:a)}:k)}:o)}));
  const deleteAction=(pId,oId,kId,aId)=>updateProjectDeep(pId,p=>({...p,okrs:(p.okrs||[]).map(o=>o.id===oId?{...o,keyResults:(o.keyResults||[]).map(k=>k.id===kId?{...k,acoes:(k.acoes||[]).filter(a=>a.id!==aId)}:k)}:o)}));

  // Toggle action status (click checkbox = toggle Concluído)
  const toggleAction=(oId,kId,aId,newStatus)=>{
    if(!selProj)return;
    updateProjectDeep(selProj.id,p=>({...p,okrs:(p.okrs||[]).map(o=>o.id===oId?{...o,keyResults:(o.keyResults||[]).map(k=>k.id===kId?{...k,acoes:(k.acoes||[]).map(a=>{
      if(a.id!==aId)return a;
      if(newStatus)return{...a,status:newStatus};
      return{...a,status:a.status==="Concluído"?"Não iniciado":"Concluído"};
    })}:k)}:o)}));
  };

  const openProject=p=>{setSelProj(p);setPage("detalhe")};
  const cur=selProj?projects.find(p=>p.id===selProj.id)||selProj:null;

  return <div style={{display:"flex",minHeight:"100vh",fontFamily:FONT,background:T.bg,color:T.text}}>
    {/* Sidebar */}
    <aside style={{width:210,background:T.surface,borderRight:"1px solid "+T.border,display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{padding:"18px 14px",borderBottom:"1px solid "+T.border}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:9,background:T.gradient,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Icons.Target style={{width:16,height:16,color:"#fff"}}/>
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:700,fontFamily:FONT_D,letterSpacing:-0.3}}>ConsultPro</div>
            <div style={{fontSize:9,color:T.textMuted,fontWeight:500}}>OKRs & Consultoria</div>
          </div>
        </div>
      </div>
      <nav style={{padding:"10px 6px",flex:1}}>
        {[{id:"dashboard",label:"Dashboard",icon:Icons.Home},{id:"projetos",label:"Projetos",icon:Icons.Folder}].map(item=>{
          const active=page===item.id||(page==="detalhe"&&item.id==="projetos");
          return <button key={item.id} onClick={()=>setPage(item.id)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"9px 11px",border:"none",borderRadius:7,cursor:"pointer",fontFamily:FONT,fontSize:12,fontWeight:active?600:500,background:active?T.accentSoft:"transparent",color:active?T.accent:T.textMuted,transition:"all 0.15s",marginBottom:2,textAlign:"left"}}>
            <item.icon style={{width:16,height:16,flexShrink:0}}/>{item.label}
          </button>;
        })}
      </nav>
      <div style={{padding:14,borderTop:"1px solid "+T.border}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:30,height:30,borderRadius:7,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>{auth.initials}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,fontWeight:600}}>{auth.name}</div>
            <div style={{fontSize:9,color:T.textMuted}}>{auth.role}</div>
          </div>
          <button onClick={handleLogout} title="Sair" style={{background:"none",border:"none",cursor:"pointer",color:T.textDim,padding:4,borderRadius:6,transition:"all 0.15s"}}
            onMouseEnter={e=>{e.currentTarget.style.color=T.danger;e.currentTarget.style.background=T.dangerSoft}}
            onMouseLeave={e=>{e.currentTarget.style.color=T.textDim;e.currentTarget.style.background="none"}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    {/* Main Content */}
    <main style={{flex:1,overflow:"auto",padding:26,maxHeight:"100vh"}}>
      {page==="dashboard"&&<DashboardPage projects={projects} openProject={openProject}/>}
      {page==="projetos"&&<ProjectsPage projects={projects} openProject={openProject} onAdd={()=>setModal("newProject")} onDelete={deleteProject}/>}
      {page==="detalhe"&&cur&&<ProjectDetail project={cur}
        onBack={()=>setPage("projetos")}
        onEdit={()=>setModal("editProject")}
        onToggleAction={toggleAction}
        onAddOKR={()=>setModal("newOKR")}
        onEditOKR={o=>setModal({type:"editOKR",data:o})}
        onDeleteOKR={oId=>deleteOKR(cur.id,oId)}
        onAddKR={oId=>setModal({type:"newKR",okrId:oId})}
        onEditKR={(oId,kr)=>setModal({type:"editKR",okrId:oId,data:kr})}
        onDeleteKR={(oId,kId)=>deleteKR(cur.id,oId,kId)}
        onAddAction={(oId,kId)=>setModal({type:"newAction",okrId:oId,krId:kId})}
        onEditAction={(oId,kId,a)=>setModal({type:"editAction",okrId:oId,krId:kId,data:a})}
        onDeleteAction={(oId,kId,aId)=>deleteAction(cur.id,oId,kId,aId)}
      />}

      {/* Modals */}
      {modal==="newProject"&&<ProjectFormModal onClose={()=>setModal(null)} onSave={addProject}/>}
      {modal==="editProject"&&cur&&<ProjectFormModal project={cur} onClose={()=>setModal(null)} onSave={d=>{updateProject(cur.id,d);setSelProj({...cur,...d})}}/>}
      {modal==="newOKR"&&cur&&<OKRFormModal onClose={()=>setModal(null)} onSave={d=>addOKR(cur.id,d)}/>}
      {modal?.type==="editOKR"&&cur&&<OKRFormModal okr={modal.data} onClose={()=>setModal(null)} onSave={d=>updateOKR(cur.id,modal.data.id,d)}/>}
      {modal?.type==="newKR"&&cur&&<KRFormModal onClose={()=>setModal(null)} onSave={d=>addKR(cur.id,modal.okrId,d)}/>}
      {modal?.type==="editKR"&&cur&&<KRFormModal kr={modal.data} onClose={()=>setModal(null)} onSave={d=>updateKR(cur.id,modal.okrId,modal.data.id,d)}/>}
      {modal?.type==="newAction"&&cur&&<ActionFormModal onClose={()=>setModal(null)} onSave={d=>addAction(cur.id,modal.okrId,modal.krId,d)}/>}
      {modal?.type==="editAction"&&cur&&<ActionFormModal action={modal.data} onClose={()=>setModal(null)} onSave={d=>updateAction(cur.id,modal.okrId,modal.krId,modal.data.id,d)}/>}
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
